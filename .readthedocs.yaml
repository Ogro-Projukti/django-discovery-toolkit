# Read the Docs — Django Discovery Toolkit (docs-only repository)
# Installs both libraries from PyPI via docs/requirements.txt (no local packages/ tree).
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
