# Read the Docs configuration — Django Discovery Toolkit (unified docs)
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: pip
      path: packages/django-udp-discovery
    # ``ifaddr`` is pinned in docs/requirements.txt so autodoc can import
    # ``discovery_client.network`` without building ``netifaces`` from source.
    - method: pip
      path: packages/django-udp-discovery-client
      extra_requirements:
        - django
    - requirements: docs/requirements.txt
